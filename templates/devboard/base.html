<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <title>DevBoard - {% block title %}{% endblock %}</title>
        <style>
            body {
                min-height: 100vh;
                background:
                    radial-gradient(circle at top, rgba(13, 110, 253, 0.16), transparent 30%),
                    linear-gradient(180deg, #f7fbff 0%, #eef5ff 45%, #e8f1ff 100%);
            }

            .app-shell {
                min-height: 100vh;
            }

            .app-navbar {
                box-shadow: 0 0.5rem 1.5rem rgba(13, 110, 253, 0.18);
            }

            .app-content {
                border: 0;
                border-radius: 1.25rem;
                box-shadow: 0 1rem 2.5rem rgba(13, 110, 253, 0.08);
            }

            .app-footer {
                color: #5b7ea6;
            }
        </style>
    </head>
    <body>
        <div class="app-shell d-flex flex-column">
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary app-navbar sticky-top">
                <div class="container py-1">
                    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/">
                        <span class="badge rounded-pill text-bg-light text-primary">DB</span>
                        DevBoard
                    </a>
                </div>
            </nav>

            <main class="flex-grow-1 py-4 py-lg-5">
                <div class="container">
                    <div class="app-content bg-white p-4 p-lg-5">
                        {% block content %}{% endblock %}
                    </div>
                </div>
            </main>

            <footer class="py-4 app-footer">
                <div class="container">
                    {% block footer %}{% endblock %}
                </div>
            </footer>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
